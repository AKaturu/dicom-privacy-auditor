name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: python
          queries: security-extended
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[all]'
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2

  dependency-audit:
    name: Dependency and static-security audit
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[dev,all]' pip-audit
      - name: Audit installed dependency graph
        run: pip-audit --strict --desc on
      - name: Scan application code
        run: bandit -q -r src scripts -ll
      - name: Validate release policy and metadata
        run: |
          python scripts/check_action_pins.py .
          python scripts/check_workflow_integrity.py .
          python scripts/check_schema_integrity.py .
          python scripts/check_dependency_locks.py .
          ruff check .
          ruff format --check .
          python -m compileall -q src scripts tests
      - name: Static type check
        run: mypy

  distribution-policy:
    name: Distribution policy guard
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[dev,packaging,standards]'
      - run: python scripts/build_release_distributions.py . --output dist --clean
      - run: python scripts/check_distribution_contents.py . dist
