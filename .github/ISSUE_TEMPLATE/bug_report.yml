name: Bug report
description: Report a reproducible problem using synthetic data only
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not upload real PHI, screenshots, logs, or DICOM files containing personal information."
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
